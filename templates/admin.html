<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Manage Users</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f0ede8;color:#1a1a1a;min-height:100vh}
.nav{background:#1a1a1a;padding:13px 28px;display:flex;align-items:center;gap:12px}
.nav-brand{font-size:16px;font-weight:700;color:#fff;flex:1}
.nav-link{font-size:12px;color:#aaa;text-decoration:none;padding:5px 12px;border-radius:6px;border:1px solid #333}
.nav-link:hover{background:#333;color:#fff}
.page{max-width:700px;margin:32px auto;padding:0 22px}
.box{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:22px 26px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.title{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
label{font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px}
input,select{width:100%;padding:9px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#1a1a1a}
.btn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-d{background:#1a1a1a;color:#fff}.btn-d:hover{background:#333}
.btn-r{background:#fde8e8;color:#8b1a1a;border:1px solid #f7c1c1}.btn-r:hover{background:#fbd0d0}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.user-row:last-child{border-bottom:none}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.b-admin{background:#fef0cc;color:#7a4800}
.b-user{background:#f0ede8;color:#666}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.a-ok{background:#d1f5e0;border:1px solid #9fe1cb;color:#0a5c30}
.a-err{background:#fde8e8;border:1px solid #f7c1c1;color:#8b1a1a}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">Invoice Extractor — Manage Users</div>
  <a href="/" class="nav-link">← Back to app</a>
  <a href="/logout" class="nav-link">Sign out</a>
</div>
<div class="page">
  <div class="box">
    <div class="title">Add new user</div>
    <div id="msg"></div>
    <div class="fg"><label>Username</label><input id="nu" placeholder="e.g. john"/></div>
    <div class="fg"><label>Password</label><input id="np" type="password" placeholder="Set a password"/></div>
    <div class="fg"><label>Role</label>
      <select id="nr"><option value="user">User (can extract invoices)</option><option value="admin">Admin (can also manage users)</option></select>
    </div>
    <button class="btn btn-d" onclick="addUser()">Add user</button>
  </div>
  <div class="box">
    <div class="title">Existing users</div>
    <div id="ulist"></div>
  </div>
</div>
<script>
async function loadUsers(){
  const r=await fetch('/api/users');const d=await r.json();
  document.getElementById('ulist').innerHTML=d.map(u=>`
    <div class="user-row">
      <span style="font-weight:600;flex:1">${u.username}</span>
      <span class="badge ${u.role==='admin'?'b-admin':'b-user'}">${u.role}</span>
      ${u.username!=='admin'?`<button class="btn btn-r" style="padding:5px 12px;font-size:12px" onclick="delUser(${u.id},'${u.username}')">Delete</button>`:'<span style="font-size:11px;color:#aaa">Protected</span>'}
    </div>`).join('');
}
async function addUser(){
  const username=document.getElementById('nu').value.trim();
  const password=document.getElementById('np').value.trim();
  const role=document.getElementById('nr').value;
  if(!username||!password){showMsg('Fill in username and password.','err');return;}
  const r=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,role})});
  const d=await r.json();
  if(d.ok){showMsg('User added successfully.','ok');document.getElementById('nu').value='';document.getElementById('np').value='';loadUsers();}
  else showMsg(d.error||'Error','err');
}
async function delUser(id,name){
  if(!confirm(`Delete user "${name}"?`))return;
  await fetch('/api/users/'+id,{method:'DELETE'});loadUsers();
}
function showMsg(h,t){const el=document.getElementById('msg');el.innerHTML=`<div class="alert a-${t}">${h}</div>`;setTimeout(()=>el.innerHTML='',3000);}
loadUsers();
</script>
</body>
</html>
